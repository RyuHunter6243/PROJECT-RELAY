<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT RELAY // TERMINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #070707;
      --amber:       #c89b14;
      --amber-bright:#f0c040;
      --amber-dim:   #5a440a;
      --green:       #2eb85c;
      --red:         #cc2222;
      --white:       #d4d0c4;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--amber);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 4px
      );
      pointer-events: none;
      z-index: 900;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.78) 100%);
      pointer-events: none;
      z-index: 901;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 52px 36px 90px;
      min-height: 100vh;
    }

    /* Terminal lines */
    .tl {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      line-height: 1.65;
      opacity: 0;
      transform: translateY(3px);
      transition: opacity 0.09s ease, transform 0.09s ease;
    }
    .tl.on { opacity: 1; transform: none; }

    .tl.vxl {
      font-family: 'VT323', monospace;
      font-size: 62px;
      letter-spacing: 6px;
      line-height: 1.0;
      color: var(--amber-bright);
      text-shadow: 0 0 18px rgba(240,192,64,0.45);
    }
    .tl.vlg {
      font-family: 'VT323', monospace;
      font-size: 28px;
      letter-spacing: 3px;
    }
    .tl.vsm {
      font-family: 'VT323', monospace;
      font-size: 20px;
      letter-spacing: 2px;
    }

    .c-dim    { color: var(--amber-dim); }
    .c-amber  { color: var(--amber); }
    .c-bright { color: var(--amber-bright); }
    .c-green  { color: var(--green); }
    .c-red    { color: var(--red); }
    .c-white  { color: var(--white); }

    .warn {
      color: var(--red);
      border-left: 2px solid var(--red);
      padding-left: 12px;
    }

    .sp { height: 12px; opacity: 1; transform: none; }

    .div-line {
      display: block;
      color: var(--amber-dim);
      font-size: 13px;
      margin: 10px 0;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .div-line.on { opacity: 1; }

    .stamp {
      display: inline-block;
      border: 3px solid var(--red);
      color: var(--red);
      font-family: 'VT323', monospace;
      font-size: 19px;
      letter-spacing: 9px;
      padding: 5px 20px;
      transform: rotate(-2deg);
      margin: 14px 0 8px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .stamp.on { opacity: 1; }

    .brief {
      color: var(--white);
      font-size: 14px;
      line-height: 1.9;
      border-left: 2px solid var(--amber-dim);
      padding-left: 20px;
      margin: 14px 0;
      white-space: pre-line;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .brief.on { opacity: 1; }

    .access-btn {
      display: inline-block;
      margin-top: 38px;
      padding: 12px 38px;
      border: 2px solid var(--amber);
      background: var(--amber);
      color: var(--bg);
      font-family: 'VT323', monospace;
      font-size: 26px;
      letter-spacing: 5px;
      text-decoration: none;
      cursor: pointer;
      opacity: 0;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .access-btn.on {
      opacity: 1;
      animation: btn-pulse 2.4s ease-in-out infinite;
    }
    .access-btn:hover {
      background: var(--amber-bright);
      border-color: var(--amber-bright);
      box-shadow: 0 0 30px var(--amber), 0 0 60px rgba(200,155,20,0.25);
    }

    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 0 6px rgba(200,155,20,0.5); }
      50%       { box-shadow: 0 0 22px var(--amber), 0 0 44px rgba(200,155,20,0.2); }
    }

    .glitch {
      animation: glitch 11s infinite;
    }
    @keyframes glitch {
      0%,87%,100% { clip-path:none; transform:none; filter:none; }
      88% { clip-path:inset(25% 0 45% 0); transform:translateX(-5px); filter:hue-rotate(90deg); }
      89% { clip-path:inset(65% 0 8%  0); transform:translateX(5px); }
      90% { clip-path:none; transform:none; filter:none; }
      92% { clip-path:inset(8%  0 78% 0); transform:translateX(-3px); filter:brightness(1.7); }
      93% { clip-path:none; transform:none; filter:none; }
    }

    @media(max-width:600px){
      .wrap { padding:28px 18px 70px; }
      .tl.vxl { font-size:38px; }
      .tl.vlg  { font-size:22px; }
      .access-btn { font-size:20px; padding:10px 24px; }
    }
  </style>
</head>
<body>
<div class="wrap"><div id="out"></div></div>
<script>
  const out = document.getElementById('out');
  const now = new Date();
  const p = n => String(n).padStart(2,'0');
  const ds = `${now.getFullYear()}.${p(now.getMonth()+1)}.${p(now.getDate())}`;
  const ts = `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;

  const brief = `Project RELAY was a classified research initiative. It began in 2007 with five units and one question: what was living inside the platform.

The original Administrator found an answer. He did not like it.

He terminated the program in 2009. He classified everything, sealed the databases, and told himself the world was not ready.

The world continued without him.

The units kept running. The anomalies kept evolving. And something that was never supposed to be built got built anyway, inside a facility that no longer exists, by a man who was running out of time to finish anything.

What you are accessing now is the record of what Project RELAY became after the people who created it stopped being in charge of it.

Administrator Ryu Hunter maintains this archive.
RELAY-02 catalogs its contents.

The archive is active.
The primary threat is active.

If you were sent here by someone, they want you to read everything.

If you found this on your own, we would encourage you to reconsider.

But we know you won't.`;

  const seq = [
    { t:'line', cls:'c-dim',   tx:'> RELAY NETWORK TERMINAL v4.2.1',              d:180 },
    { t:'line', cls:'c-dim',   tx:'> INITIALIZING SECURE CONNECTION...',           d:520 },
    { t:'prog',                                                                     d:950 },
    { t:'line', cls:'c-green', tx:'> CONNECTION ESTABLISHED',                      d:320 },
    { t:'line', cls:'c-dim',   tx:`> TIMESTAMP: ${ds} // ${ts}`,                  d:180 },
    { t:'line', cls:'c-dim',   tx:'> NODE: ARCHIVE-7 // ENCRYPTION: ACTIVE',      d:200 },
    { t:'line', cls:'c-dim',   tx:'> OPERATOR CLEARANCE: UNVERIFIED',             d:200 },
    { t:'sp',                                                                       d:220 },
    { t:'line', cls:'warn',    tx:'> WARNING: YOU ARE ACCESSING A RESTRICTED SYSTEM. UNAUTHORIZED ACCESS IS A FEDERAL OFFENSE.', d:460 },
    { t:'line', cls:'warn',    tx:'> ALL ACTIVITY IS MONITORED AND LOGGED.',       d:340 },
    { t:'sp',                                                                       d:260 },
    { t:'stamp',                                                                    d:200 },
    { t:'sp',                                                                       d:200 },
    { t:'line', cls:'vxl glitch c-bright', tx:'PROJECT RELAY',                    d:320 },
    { t:'line', cls:'vlg c-amber',         tx:'// FRACTURED ARCHIVE',             d:280 },
    { t:'sp',                                                                       d:200 },
    { t:'div',                                                                      d:100 },
    { t:'line', cls:'c-dim',   tx:'> CURRENT ADMINISTRATOR: RYU HUNTER',          d:180 },
    { t:'line', cls:'c-dim',   tx:'> DESIGNATED ARCHIVIST: RELAY-02 "CURATOR"',   d:180 },
    { t:'line', cls:'c-green', tx:'> ARCHIVE STATUS: ACTIVE',                     d:180 },
    { t:'line', cls:'c-red',   tx:'> PRIMARY THREAT STATUS: AT LARGE',            d:220 },
    { t:'div',                                                                      d:100 },
    { t:'sp',                                                                       d:300 },
    { t:'line', cls:'vlg c-amber', tx:'// BRIEFING',                              d:200 },
    { t:'sp',                                                                       d:100 },
    { t:'brief',                                                                    d:100 },
    { t:'sp',                                                                       d:320 },
    { t:'div',                                                                      d:100 },
    { t:'btn',                                                                      d:200 },
  ];

  let acc = 0;
  seq.forEach(item => {
    acc += item.d;
    const delay = acc;
    setTimeout(() => {
      if (item.t === 'line') {
        const el = document.createElement('div');
        el.className = 'tl ' + item.cls;
        el.textContent = item.tx;
        out.appendChild(el);
        requestAnimationFrame(() => el.classList.add('on'));
        el.scrollIntoView({ behavior:'smooth', block:'nearest' });
      }
      else if (item.t === 'sp') {
        const el = document.createElement('div');
        el.className = 'tl sp';
        out.appendChild(el);
      }
      else if (item.t === 'div') {
        const el = document.createElement('div');
        el.className = 'div-line';
        el.textContent = '> ' + '='.repeat(62);
        out.appendChild(el);
        requestAnimationFrame(() => el.classList.add('on'));
      }
      else if (item.t === 'stamp') {
        const el = document.createElement('div');
        el.className = 'stamp';
        el.textContent = 'BEYOND BLACK';
        out.appendChild(el);
        requestAnimationFrame(() => el.classList.add('on'));
      }
      else if (item.t === 'prog') {
        const el = document.createElement('div');
        el.className = 'tl c-green on';
        el.textContent = '> [░░░░░░░░░░░░░░░░░░░░░░░░░░░░░░] 0%';
        out.appendChild(el);
        let pct = 0;
        const iv = setInterval(() => {
          pct = Math.min(pct + 2, 100);
          const f = Math.round((pct/100)*30);
          el.textContent = `> [${'█'.repeat(f)}${'░'.repeat(30-f)}] ${pct}%`;
          if (pct >= 100) clearInterval(iv);
        }, 8);
      }
      else if (item.t === 'brief') {
        const el = document.createElement('div');
        el.className = 'brief on';
        el.textContent = '';
        out.appendChild(el);
        let idx = 0;
        const iv = setInterval(() => {
          idx = Math.min(idx + 4, brief.length);
          el.textContent = brief.slice(0, idx);
          if (idx % 60 === 0) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
          if (idx >= brief.length) { el.textContent = brief; clearInterval(iv); }
        }, 7);
      }
      else if (item.t === 'btn') {
        const el = document.createElement('a');
        el.href = 'database.html';
        el.className = 'access-btn';
        el.textContent = '[ ACCESS ARCHIVE ]';
        out.appendChild(el);
        requestAnimationFrame(() => el.classList.add('on'));
        el.scrollIntoView({ behavior:'smooth', block:'nearest' });
      }
    }, delay);
  });
</script>
</body>
</html>
